<section class="min-h-screen py-24">
  <div class="max-w-7xl mx-auto px-4">
    <div class="text-center mb-16">
      <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 dark:text-white">{{ texts.title }}</h1>
      <p class="mt-4 text-lg text-gray-500 dark:text-gray-400 max-w-2xl mx-auto">
        {{ texts.subtitle }}
      </p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      @for (step of steps(); track step.title) {
        <article class="relative text-center p-8">
          <span class="text-6xl font-black text-gradient-shimmer block mb-2">{{ step.display }}{{ step.suffix }}</span>
          <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">{{ step.title }}</h3>
          <p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed">{{ step.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
