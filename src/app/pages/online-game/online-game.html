<section class="max-w-screen-2xl mx-auto px-4 py-10">
  <div class="flex flex-col lg:flex-row gap-6 items-start justify-center">

    <!-- Players (left) -->
    <div class="flex flex-col gap-8 lg:self-center">
      <app-player-card [player]="opponent" [time]="formatTime(opponentTime())" [isActive]="!isPlayerTurn()" />
      <app-player-card [player]="player" [time]="formatTime(playerTime())" [isActive]="isPlayerTurn()" />
    </div>

    <!-- Board (center) -->
    <app-chess-board />

    <!-- Sidebar (right) -->
    <aside class="w-full lg:w-72 flex flex-col gap-4">
      <app-game-info [items]="gameInfoItems" />
      <app-game-controls
        (resign)="onResign()"
        (drawOffer)="onDrawOffer()"
        (rematch)="onRematch()" />
      <app-move-history [moves]="moves" />
    </aside>

  </div>
</section>
