<section class="max-w-screen-2xl mx-auto px-4 py-10">
  <div class="flex flex-col lg:flex-row gap-6 items-start justify-center">

    <!-- Players (left) -->
    <div class="flex flex-col gap-3 lg:self-center">
      <app-player-card [player]="opponent" time="08:32" [isActive]="false" />
      <app-player-card [player]="player" time="09:15" [isActive]="true" />
    </div>

    <!-- Board (center) -->
    <app-chess-board />

    <!-- Sidebar (right) -->
    <aside class="w-full lg:w-72 flex flex-col gap-4">
      <app-game-info [items]="gameInfoItems" />
      <app-game-controls
        (resign)="onResign()"
        (drawOffer)="onDrawOffer()"
        (rematch)="onRematch()" />
      <app-move-history [moves]="moves" />
      
    </aside>

  </div>
</section>
