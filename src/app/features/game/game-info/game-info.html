<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-4" [class]="radius.md">
  <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-3">{{ title() }}</h3>
  <div class="space-y-2 text-lg text-gray-500 dark:text-gray-400">
    @for (item of items(); track item.label) {
      <p>{{ item.icon }} {{ item.label }}</p>
    }
  </div>
</div>
