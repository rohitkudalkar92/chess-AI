<section class="fixed inset-0 z-[100] bg-gray-950 flex flex-col items-center justify-center gap-6">
  <!-- Animated chess piece -->
  <img [src]="currentPiece()" alt="Loading chess piece" class="w-20 h-20 animate-bounce" />

  <!-- Title -->
  <h2 class="text-white text-xl font-semibold tracking-wide">{{ appName }}</h2>

  <!-- Progress bar -->
  <div class="w-48 h-1 bg-gray-800 overflow-hidden" [class]="radius.md">
    <div class="h-full bg-amber-500 animate-loader" [class]="radius.md"></div>
  </div>

  <p class="text-gray-500 text-sm">{{ loaderMessage }}</p>
</section>
